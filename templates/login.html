{% extends "base.html" %}

{% block title %}Login - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Login</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username or Email</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter username or email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group password-toggle-group">
                            <input type="password" class="form-control" id="password" name="password" required>
                            <button class="btn btn-outline-secondary toggle-password" type="button" aria-label="Show password">👁</button>
                        </div>
                    </div>
                    <div class="mb-3 text-end">
                        <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>
                <hr>
                <div class="text-center">
                    <p>Don't have an account?</p>
                    <a href="{{ url_for('register_company') }}" class="btn btn-outline-primary btn-sm me-2">Register as Company</a>
                    <a href="{{ url_for('register_student') }}" class="btn btn-outline-primary btn-sm">Register as Student</a>
                </div>
                <div class="mt-3 text-center">
                    <small class="text-muted">Admin Login: username: admin, password: admin123</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
